<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>치즈 서치 - 기능 설정</title>
    <script src="src/themeInit.js"></script>
    <link rel="stylesheet" href="src/popup.css" />
    <link rel="stylesheet" href="src/settings.css" />
  </head>
  <body>
    <main class="settings-shell">
      <header class="settings-header">
        <div class="settings-header-text">
          <h1>기능 설정</h1>
          <p class="settings-subtitle">사용하지 않는 기능을 끄고 숨길 수 있어요.</p>
        </div>
        <button
          type="button"
          class="popup-icon-button"
          id="themeToggleButton"
          aria-label="다크 모드로 전환"
          aria-pressed="false"
        >
          <svg
            class="popup-theme-icon popup-theme-icon-sun"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            aria-hidden="true"
          >
            <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"></circle>
            <path
              d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            ></path>
          </svg>
          <svg
            class="popup-theme-icon popup-theme-icon-moon"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            aria-hidden="true"
          >
            <path
              d="M20.5 14.5A8.5 8.5 0 0 1 9.5 3.5 8.5 8.5 0 1 0 20.5 14.5Z"
              stroke="currentColor"
              stroke-width="2"
              stroke-linejoin="round"
            ></path>
          </svg>
        </button>
      </header>

      <p class="settings-hint">
        체크하면 해당 기능을 끄고 아이콘/UI를 숨깁니다. '스트림 정보'는 체크를
        해제하면 기능까지 다시 켜집니다.
      </p>

      <section class="settings-group" aria-label="플레이어 기능">
        <h2 class="settings-group-title">플레이어</h2>
        <ul class="settings-list">
          <li class="settings-item">
            <label>
              <span class="settings-item-name">오디오 믹서 숨김</span>
              <span class="settings-item-desc">컴프레서·EQ·볼륨 보정 버튼</span>
            </label>
            <label class="settings-switch">
              <input type="checkbox" data-feature="audioMixer" />
              <i aria-hidden="true"></i>
            </label>
          </li>
          <li class="settings-item">
            <label>
              <span class="settings-item-name">비디오 필터 숨김</span>
              <span class="settings-item-desc">밝기·대비·선명도 등 화면 보정</span>
            </label>
            <label class="settings-switch">
              <input type="checkbox" data-feature="videoFilter" />
              <i aria-hidden="true"></i>
            </label>
          </li>
          <li class="settings-item">
            <label>
              <span class="settings-item-name">실시간 따라잡기 숨김</span>
              <span class="settings-item-desc">라이브 지연 따라잡기 버튼</span>
            </label>
            <label class="settings-switch">
              <input type="checkbox" data-feature="liveSync" />
              <i aria-hidden="true"></i>
            </label>
          </li>
          <li class="settings-item">
            <label>
              <span class="settings-item-name">스트림 정보 숨김</span>
              <span class="settings-item-desc">해상도·비트레이트·코덱 정보</span>
            </label>
            <label class="settings-switch">
              <input type="checkbox" data-feature="streamStats" />
              <i aria-hidden="true"></i>
            </label>
          </li>
          <li class="settings-item">
            <label>
              <span class="settings-item-name">댓글 타임스탬프 숨김</span>
              <span class="settings-item-desc">재생바 댓글 마커·목록</span>
            </label>
            <label class="settings-switch">
              <input type="checkbox" data-feature="commentTimestamp" />
              <i aria-hidden="true"></i>
            </label>
          </li>
          <li class="settings-item">
            <label>
              <span class="settings-item-name">미리보기 실제 시각 숨김</span>
              <span class="settings-item-desc">다시보기 탐색 미리보기의 방송 당시 시각</span>
            </label>
            <label class="settings-switch">
              <input type="checkbox" data-feature="seekPreviewRealtime" />
              <i aria-hidden="true"></i>
            </label>
          </li>
        </ul>
      </section>

      <section class="settings-group" aria-label="실시간 따라잡기">
        <h2 class="settings-group-title">실시간 따라잡기 민감도</h2>
        <div class="settings-segmented" id="syncPreset" role="radiogroup">
          <button type="button" data-sync-preset="low" role="radio" aria-checked="false">
            낮음
            <small>끊김 최소</small>
          </button>
          <button type="button" data-sync-preset="normal" role="radio" aria-checked="true">
            보통
            <small>기본</small>
          </button>
          <button type="button" data-sync-preset="high" role="radio" aria-checked="false">
            높음
            <small>바짝 따라감</small>
          </button>
        </div>
        <p class="settings-group-desc">
          따라잡기를 시작하는 지연과 목표 지연을 정합니다. '높음'은 라이브에 가깝게
          유지하지만 끊김이 잦을 수 있고, '낮음'은 느슨해 끊김이 적습니다.
        </p>
      </section>

      <section class="settings-group" aria-label="검색 기능">
        <h2 class="settings-group-title">검색</h2>
        <ul class="settings-list">
          <li class="settings-item">
            <label>
              <span class="settings-item-name">다시보기 검색 숨김</span>
              <span class="settings-item-desc">다시보기 목록 검색 화면</span>
            </label>
            <label class="settings-switch">
              <input type="checkbox" data-feature="searchVideos" />
              <i aria-hidden="true"></i>
            </label>
          </li>
          <li class="settings-item">
            <label>
              <span class="settings-item-name">클립 검색 숨김</span>
              <span class="settings-item-desc">클립 목록 검색 화면</span>
            </label>
            <label class="settings-switch">
              <input type="checkbox" data-feature="searchClips" />
              <i aria-hidden="true"></i>
            </label>
          </li>
        </ul>
      </section>

      <section class="settings-group" aria-label="레이아웃">
        <h2 class="settings-group-title">레이아웃</h2>
        <ul class="settings-list">
          <li class="settings-item">
            <label>
              <span class="settings-item-name">사이드바 숨김</span>
              <span class="settings-item-desc">왼쪽 채널/메뉴 사이드바</span>
            </label>
            <label class="settings-switch">
              <input type="checkbox" data-feature="sidebar" />
              <i aria-hidden="true"></i>
            </label>
          </li>
        </ul>
      </section>

      <section class="settings-group" aria-label="클립 기능">
        <h2 class="settings-group-title">클립</h2>
        <ul class="settings-list">
          <li class="settings-item">
            <label>
              <span class="settings-item-name">'클릭하여 라이브 시청' 숨김</span>
              <span class="settings-item-desc">클립 재생 중 라이브 이동 버튼</span>
            </label>
            <label class="settings-switch">
              <input type="checkbox" data-feature="clipLiveButton" checked />
              <i aria-hidden="true"></i>
            </label>
          </li>
        </ul>
      </section>
    </main>
    <script src="src/settings.js"></script>
  </body>
</html>
